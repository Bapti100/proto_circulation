name: Collecte trafic horaire

on:
  schedule:
    # Toutes les heures, à :05 (évite la congestion des runners à :00)
    - cron: '5 * * * *'
  # Permet de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # indispensable pour Workload Identity Federation

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Authentification Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Installer les dépendances
        run: pip install -r collector/requirements.txt

      - name: Lancer la collecte
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
          GSHEET_ID:     ${{ secrets.GSHEET_ID }}
        run: python collector/gcollect.py
